<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style_eportfolio.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
        <style>
            /* Styles pour le formulaire de contact */
            .contact-form {
                display: flex;
                flex-direction: column;
                gap: 15px;
                max-width: 800px; /* Formulaire plus large */
                margin: 0 auto 60px auto; /* Marge en bas pour séparer des boutons */
                text-align: left;
                width: 100%;
                padding: 40px; /* Espace intérieur pour aérer */
                background-color: rgba(0, 0, 0, 0.03); /* Fond léger pour l'effet fenêtre */
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* Ombre douce */
                position: relative;
                z-index: 100; /* S'assure que le formulaire est au-dessus des autres éléments */
            }
            .contact-form label { font-weight: bold; margin-bottom: 5px; display: block; }
            .contact-form input, .contact-form textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                font-family: 'Roboto', sans-serif;
                box-sizing: border-box;
                background-color: #ffffff !important; /* Force le fond blanc avec priorité absolue */
                color: #000000 !important; /* Force le texte en noir avec priorité absolue */
                display: block !important; /* Force l'affichage */
                opacity: 1 !important;
            }
            .contact-form button {
                padding: 12px 24px;
                background-color: #333;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 1rem;
                transition: background-color 0.3s;
                align-self: flex-start;
                position: relative; /* S'assure que le bouton est bien cliquable */
                z-index: 200;
            }
            .contact-form button:hover { background-color: #555; }
            
            /* Adaptation Dark Mode */
            body.dark-mode .contact-form input, 
            body.dark-mode .contact-form textarea {
                background-color: #444 !important;
                color: white !important;
                border-color: #666;
            }
            body.dark-mode .contact-form { background-color: rgba(255, 255, 255, 0.05); }
            body.dark-mode .contact-form button { background-color: #fff; color: #333; }
            body.dark-mode .contact-form button:hover { background-color: #ddd; }
        </style>
    </head>
    <body>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <header id="header">
            <h1>Tristan Moreau</h1>
        </header>
        <div class="fieldplease">
            <fieldset class="first_fieldset">
                <input id="1" name="menu" type="radio" onclick="function_home()"></input>
                <label for="1">About</label>
                <input id="2" name="menu" type="radio" onclick="function_about_me()"></input>
                <label for="2">Career Management</label>
                <input id="3" name="menu" type="radio" onclick="function_skills()"></input>
                <label for="3">Skills</label>
                <input id="nav_projects" name="menu" type="radio" onclick="function_projects()"></input>
                <label for="nav_projects">Projects</label>
                <input id="4" name="menu" type="radio" onclick="function_mobility()"></input>
                <label for="4">Mobility</label>
                <input id="5" name="menu" type="radio" onclick="function_experience()"></input>
                <label for="5">Civic Engagement</label>
                <input checked id="6" name="menu" type="radio" onclick="function_contacts()"></input>
                <label for="6">Contacts</label>
            </fieldset>
        </div>
        <div class="corps_contact_me">
            <h2>Want to get in touch with me ?</h2>
        </div>
        <div class="contact_me_home">
            <h1>Contact Me :</h1>
            <!-- Formulaire déplacé hors du conteneur des boutons pour être indépendant -->
            <!-- IMPORTANT : Remplacez 'YOUR_FORM_ID' ci-dessous par votre propre ID Formspree -->
            <form action="https://formspree.io/f/xrebnkyr" method="POST" class="contact-form">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="8" required placeholder="Hi Tristan, I would like to contact you regarding..."></textarea>
                
                <button type="submit">Send Message</button>
            </form>

            <div class="contact_container">
                <div class="cv_download">
                    <a href="Images_e_portfolio/CV français (1).pdf" download class="testss">French CV</a>
                </div>
                <div class="cv_download">
                    <a href="Images_e_portfolio/English_CV_Tristan_Moreau.pdf" download class="testss">English CV</a>
                </div>
                <div class="linkedin_photo">
                    <a href="https://www.linkedin.com/in/tristan-moreau-a49438329/" target="_blank"><img src="Images_e_portfolio/icone_linkedin.png" class="icone_contact"/></a>
                </div>
            </div>
        </div>
        <a class="cornerbutton" href="#header">
            <img src="Images_e_portfolio/fleche_haut.png">
        </a>
        <footer>
            <div class="footer_content">
                <p>&copy; <span id="current-year">2026</span> Tristan Moreau - Engineering Student</p>
                <div class="footer_socials" style="display: flex; justify-content: center; gap: 20px;">
                    <a href="https://www.linkedin.com/in/tristan-moreau-a49438329/" target="_blank"><img src="Images_e_portfolio/icone_linkedin.png" alt="LinkedIn" class="footer_icon"></a>
                    <a href="#" onclick="copyFooterEmail(event)"><img src="Images_e_portfolio/icone_mail.png" alt="Email" class="footer_icon"></a>
                </div>
            </div>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
