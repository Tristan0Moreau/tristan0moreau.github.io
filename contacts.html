<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style_eportfolio.css" />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%235f9ea0'/><text x='50' y='70' text-anchor='middle' font-size='60' fill='white' font-family='sans-serif' font-weight='bold'>TM</text></svg>">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="lang-toggle" onclick="toggleLanguage()">Français</button>
        <header id="header">
            <h1>Tristan Moreau</h1>
        </header>
        <div class="fieldplease">
            <fieldset class="first_fieldset">
                <input id="1" name="menu" type="radio" onclick="function_home()"></input>
                <label for="1">About</label>
                <input id="2" name="menu" type="radio" onclick="function_about_me()"></input>
                <label for="2">Career Management</label>
                <input id="3" name="menu" type="radio" onclick="function_skills()"></input>
                <label for="3">Skills</label>
                <input id="nav_projects" name="menu" type="radio" onclick="function_projects()"></input>
                <label for="nav_projects">Projects</label>
                <input id="4" name="menu" type="radio" onclick="function_mobility()"></input>
                <label for="4">Mobility</label>
                <input id="5" name="menu" type="radio" onclick="function_experience()"></input>
                <label for="5">Civic Engagement</label>
                <input checked id="6" name="menu" type="radio" onclick="function_contacts()"></input>
                <label for="6">Contacts</label>
            </fieldset>
        </div>
        <div class="corps_contact_me">
            <h2>Want to get in touch with me ?</h2>
        </div>
        <div class="contact_me_home">
            <h1>Contact Me :</h1>
        <form action="https://formspree.io/f/xrebnkyr" method="POST" class="contact-form" id="contact_form">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="8" required placeholder="Hi Tristan, I would like to contact you regarding..."></textarea>
                
                <button type="submit">Send Message</button>
            </form>

            <div class="contact_container">
                <div class="cv_download">
                    <a href="Images_e_portfolio/CV_francais.pdf" download class="testss">French CV</a>
                </div>
                <div class="cv_download">
                    <a href="Images_e_portfolio/English_CV.pdf" download class="testss">English CV</a>
                </div>
                <div class="cv_download">
                    <a href="https://www.linkedin.com/in/tristan-moreau-a49438329/" target="_blank" class="testss">LinkedIn</a>
                </div>
                <div class="cv_download">
                    <a href="https://github.com/Tristan0Moreau" target="_blank" class="testss">GitHub</a>
                </div>
            </div>
        </div>
        <a class="cornerbutton" href="#header">
            <img src="Images_e_portfolio/fleche_haut.png">
        </a>
        <footer>
            <div class="footer_content">
                <p>&copy; <span id="current-year">2026</span> Tristan Moreau - Engineering Student</p>
                <div class="footer_socials" style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                    <a href="https://www.linkedin.com/in/tristan-moreau-a49438329/" target="_blank" class="testss">LinkedIn</a>
                    <a href="https://github.com/Tristan0Moreau" target="_blank" class="testss">GitHub</a>
                    <a href="contacts.html#contact_form" class="testss">Contact</a>
                </div>
            </div>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
