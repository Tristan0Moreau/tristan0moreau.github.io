<!DOCTYPE html>
<html lang="fr">
    <head>
        <link rel="stylesheet" href="style_eportfolio.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="lang-toggle" onclick="toggleLanguage()">English</button>
        <header id="header">
            <h1>Tristan Moreau</h1>
        </header>
        <div class="fieldplease">
            <fieldset class="first_fieldset">
                <input id="1" name="menu" type="radio" onclick="function_home()"></input>
                <label for="1">À propos</label>
                <input id="2" name="menu" type="radio" onclick="function_about_me()"></input>
                <label for="2">Projet Pro</label>
                <input id="3" name="menu" type="radio" onclick="function_skills()"></input>
                <label for="3">Compétences</label>
                <input id="nav_projects" name="menu" type="radio" onclick="function_projects()"></input>
                <label for="nav_projects">Projets</label>
                <input id="4" name="menu" type="radio" onclick="function_mobility()"></input>
                <label for="4">Mobilité</label>
                <input id="5" name="menu" type="radio" onclick="function_experience()"></input>
                <label for="5">Engagement</label>
                <input checked id="6" name="menu" type="radio" onclick="function_contacts()"></input>
                <label for="6">Contacts</label>
            </fieldset>
        </div>
        <div class="corps_contact_me">
            <h2>Vous souhaitez me contacter ?</h2>
        </div>
        <div class="contact_me_home">
            <h1>Contactez-moi :</h1>
            <form action="https://formspree.io/f/xrebnkyr" method="POST" class="contact-form">
                <label for="email">Votre Email :</label>
                <input type="email" id="email" name="email" required placeholder="votre.email@exemple.com">
                
                <label for="message">Message :</label>
                <textarea id="message" name="message" rows="8" required placeholder="Bonjour Tristan, je souhaiterais vous contacter concernant..."></textarea>
                
                <button type="submit">Envoyer le message</button>
            </form>

            <div class="contact_container">
                <div class="cv_download">
                    <a href="Images_e_portfolio/CV français.pdf" download class="testss">CV Français</a>
                </div>
                <div class="cv_download">
                    <a href="Images_e_portfolio/English CV.pdf" download class="testss">CV Anglais</a>
                </div>
                <div class="cv_download">
                    <a href="https://www.linkedin.com/in/tristan-moreau-a49438329/" target="_blank" class="testss">LinkedIn</a>
                </div>
                <div class="cv_download">
                    <a href="https://github.com/Tristan0Moreau" target="_blank" class="testss">GitHub</a>
                </div>
            </div>
        </div>
        <a class="cornerbutton" href="#header">
            <img src="Images_e_portfolio/fleche_haut.png">
        </a>
        <footer>
            <div class="footer_content">
                <p>&copy; <span id="current-year">2026</span> Tristan Moreau - Élève Ingénieur</p>
                <div class="footer_socials" style="display: flex; justify-content: center; gap: 20px;">
                    <a href="https://www.linkedin.com/in/tristan-moreau-a49438329/" target="_blank"><img src="Images_e_portfolio/icone_linkedin.png" alt="LinkedIn" class="footer_icon"></a>
                    <a href="#" onclick="copyFooterEmail(event)"><img src="Images_e_portfolio/icone_mail.png" alt="Email" class="footer_icon"></a>
                </div>
            </div>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
